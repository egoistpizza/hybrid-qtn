# Kvasir-SEG dataset config
#
# Layout expected after running `python scripts/download_kvasir_seg.py`:
#   data/kvasir-seg/Kvasir-SEG/images/*.jpg
#   data/kvasir-seg/Kvasir-SEG/masks/*.jpg

dataset_name: kvasir-seg

images_dir: data/kvasir-seg/Kvasir-SEG/images
masks_dir:  data/kvasir-seg/Kvasir-SEG/masks
image_ext:  .jpg
mask_ext:   .jpg

# Pairing behavior. When true, an unpaired image or mask raises.
# Set to false to warn + skip instead.
strict_pairing: true

# Raw mask is grayscale 0-255; values strictly greater than this threshold
# become foreground (1.0), the rest background (0.0).
mask_threshold: 127

# Albumentations pipeline. Applied jointly to image and mask.
# Order matters. ToTensorV2 must be last.
transforms:
  - name: Resize
    height: 512
    width: 512
  - name: HorizontalFlip
    p: 0.5
  - name: VerticalFlip
    p: 0.5
  - name: Normalize
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]
    max_pixel_value: 255.0
  - name: ToTensorV2
